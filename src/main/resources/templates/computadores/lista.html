<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário de Computadores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div th:replace="~{fragments/menu :: navbar}"></div>

    <div class="container">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Inventário de Computadores</h1>
            <div>
                <a href="/downloads/configuracao_vnc.zip" class="btn btn-outline-secondary me-2" title="Baixar arquivos de configuração e tutorial para VNC" download>
                    Baixar Configuração VNC
                </a>
                <a href="/computadores/novo" class="btn btn-primary">+ Novo Computador</a>
            </div>
        </div>

        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <form th:action="@{/computadores}" method="get">
                    <div class="input-group">
                        <span class="input-group-text bg-primary text-white">🔍</span>
                        <input type="text" class="form-control" name="termo" th:value="${termoBusca}"
                                placeholder="Digite um dos atributos das máquinas para pesquisar (Hostname, Serial ou IP...)">
                        <button class="btn btn-primary" type="submit">Pesquisar</button>
                        <a href="/computadores" class="btn btn-outline-secondary">Limpar Filtro</a>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                Computadores Cadastrados
            </div>
            <div class="card-body">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Hostname</th>
                            <th>Serial</th>
                            <th>Endereço IP</th>
                            <th>Status</th>
                            <th>Setor</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="comp : ${computadores}">
                            <td th:text="${comp.id}">1</td>
                            <td th:text="${comp.hostname}">SMSHMJSH</td>
                            <td th:text="${comp.serialComputador}">BRC210ABC</td>
                            <td th:text="${comp.enderecoIp}">192.168.160.1</td>
                            <td>
                                <span class="badge bg-info text-dark" th:text="${comp.status}">Status</span>
                            </td>
                            <td th:text="${comp.setor != null ? comp.setor.nome : 'Sem Setor alocado'}">TI</td>
                            <td>
                                <a th:href="@{vnc://{host}(host=${comp.hostname})}" class="btn btn-info btn-sm me-2" title="Acesso Remoto VNC">
                                    VNC
                                </a>
                                <a th:href="@{/computadores/editar/{id}(id=${comp.id})}" class="btn btn-warning btn-sm me-2">
                                    Editar
                                </a>
                                <a th:href="@{/computadores/excluir/{id}(id=${comp.id})}" class="btn btn-danger btn-sm"
                                    onclick="return confirm('Tem certeza que deseja remover esta máquina do inventário?');">
                                    Excluir
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(computadores)}">
                            <td colspan="7" class="text-center text-muted">Nenhum computador encontrado.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
