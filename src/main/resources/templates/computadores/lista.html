<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário de Computadores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

    <div th:replace="~{fragments/menu :: navbar}"></div>

    <div class="container">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Inventário de Computadores</h1>
            <div>
                <a href="/relatorios/configurar?modulo=computadores" class="btn btn-outline-primary me-2">
                    📊 Gerar Relatório
                </a>
                <a href="/downloads/configuracao_vnc.zip" class="btn btn-outline-secondary me-2" title="Baixar arquivos de configuração e tutorial para VNC" download>
                    Baixar Configuração VNC
                </a>
                <a href="/computadores/novo" class="btn btn-primary">+ Novo Computador</a>
            </div>
        </div>

        <!-- Barra de Busca e Filtros -->
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <form th:action="@{/computadores}" method="get">
                    <div class="row g-3 align-items-center">
                        <!-- Busca -->
                        <div class="col-md-12 col-lg-5">
                            <div class="input-group">
                                <span class="input-group-text bg-primary text-white"><i class="bi bi-search"></i></span>
                                <input type="text" class="form-control" name="termo" th:value="${termoBusca}"
                                       placeholder="Pesquisar por Hostname, Serial, IP, Status ou Setor...">
                            </div>
                        </div>
                        
                        <!-- Ordenação -->
                        <div class="col-md-5 col-lg-3">
                            <div class="input-group">
                                <span class="input-group-text bg-light text-secondary"><i class="bi bi-sort-down"></i></span>
                                <select class="form-select" name="ordenarPor">
                                    <option value="id" th:selected="${ordenarPor == 'id'}">Ordenar por ID</option>
                                    <option value="hostname" th:selected="${ordenarPor == 'hostname'}">Ordenar por Hostname</option>
                                    <option value="serialComputador" th:selected="${ordenarPor == 'serialComputador'}">Ordenar por Serial</option>
                                    <option value="enderecoIp" th:selected="${ordenarPor == 'enderecoIp'}">Ordenar por IP</option>
                                    <option value="status" th:selected="${ordenarPor == 'status'}">Ordenar por Status</option>
                                    <option value="setor" th:selected="${ordenarPor == 'setor'}">Ordenar por Setor</option>
                                </select>
                            </div>
                        </div>

                        <!-- Direção -->
                        <div class="col-md-4 col-lg-2">
                            <select class="form-select" name="direcao">
                                <option value="ASC" th:selected="${direcao == 'ASC'}">Crescente</option>
                                <option value="DESC" th:selected="${direcao == 'DESC'}">Decrescente</option>
                            </select>
                        </div>

                        <!-- Botões -->
                        <div class="col-md-3 col-lg-2 d-flex gap-2">
                            <button class="btn btn-primary flex-grow-1" type="submit">Filtrar</button>
                            <a href="/computadores" class="btn btn-outline-secondary" title="Limpar todos os filtros">
                                <i class="bi bi-x-circle"></i>
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                Computadores Cadastrados
            </div>
            <div class="card-body">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Hostname</th>
                            <th>Serial</th>
                            <th>Endereço IP</th>
                            <th>Status</th>
                            <th>Setor</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="comp : ${computadores}">
                            <td th:text="${comp.id}">1</td>
                            <td>
                                <span th:text="${comp.hostname}">SMSHMJSH</span>
                                <i class="bi bi-info-circle-fill text-info ms-2" 
                                   style="cursor: help;"
                                   th:if="${comp.observacoes != null and !comp.observacoes.trim().isEmpty()}"
                                   th:title="${comp.observacoes}"></i>
                            </td>
                            <td th:text="${comp.serialComputador}">BRC210ABC</td>
                            <td th:text="${comp.redeIp != null ? comp.redeIp.enderecoIp : 'Sem IP'}">192.168.160.1</td>
                            <td>
                                <span class="badge bg-info text-dark" th:text="${comp.status}">Status</span>
                            </td>
                            <td class="align-middle">
                                <span th:if="${comp.setor != null}" th:text="${comp.setor.nome}">Setor</span>
                                <span th:if="${comp.setor == null}" class="badge bg-secondary text-white">Informática Reserva</span>
                            </td>
                            <td>
                                <a th:href="@{vnc://{host}(host=${comp.hostname})}" class="btn btn-info btn-sm me-2" title="Acesso Remoto VNC">
                                    VNC
                                </a>
                                <a th:href="@{/computadores/editar/{id}(id=${comp.id})}" class="btn btn-warning btn-sm me-2">
                                    Editar
                                </a>
                                <a th:href="@{/computadores/excluir/{id}(id=${comp.id})}" class="btn btn-danger btn-sm"
                                    onclick="return confirm('Tem certeza que deseja remover esta máquina do inventário?');">
                                    Excluir
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(computadores)}">
                            <td colspan="7" class="text-center text-muted">Nenhum computador encontrado.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
