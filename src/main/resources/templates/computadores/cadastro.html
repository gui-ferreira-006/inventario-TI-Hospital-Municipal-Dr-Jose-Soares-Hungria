<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Máquinas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    
    <div th:replace="~{fragments/menu :: navbar}"></div>

    <div class="container">
        <div class="card shadow-sm mt-4">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Configuração de Nova Máquina</h4>
            </div>
            <div class="card-body">

                <form th:action="@{/computadores/salvar}" th:object="${computador}" method="post">

                    <input type="hidden" th:field="*{id}">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="hostname" class="form-label">Hostname (Domínio)</label>
                            <!-- Input unificado com validação e placeholder -->
                            <input type="text" id="hostname" class="form-control" th:field="*{hostname}"
                                    placeholder="Ex: SMSHMJSH001"
                                    th:classappend="${#fields.hasErrors('hostname')} ? 'is-invalid'">
                            <!-- Mensagem de Erro -->
                             <div class="invalid-feedback" th:if="${#fields.hasErrors('hostname')}" th:errors="*{hostname}"></div>        
                    

                        <div class="col-md-6 mb-3">
                            <label for="serialComputador" class="form-label">Número de Série</label>
                            <input type="text" id="serialComputador" class="form-control" th:field="*{serialComputador}"
                                    placeholder="Ex: BRC210ABC"
                                    th:classappend="${#fields.hasErrors('serialComputador')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('serialComputador')}" th:errors="*{serialComputador}"></div>        
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="enderecoIp" class="form-label">Endereço IP</label>
                            <select class="form-select" id="enderecoIp" th:field="*{redeIp}" th:classappend="${#fields.hasErrors('redeIp')} ? 'is-invalid'">
                                <option value="">-- Sem IP Alocado --</option>
                                <option th:each="ip : ${ipsLivres}" th:value="${ip.id}" th:text="${ip.enderecoIp}"></option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('redeIp')}" th:errors="*{redeIp}"></div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="status" class="form-label">Status da Máquina</label>
                            <select class="form-select" id="status" th:field="*{status}">
                                <option value="Em Estoque/Bancada">Em Estoque / Bancada</option>
                                <option value="Em Configuração">Em Configuração</option>
                                <option value="Ativo no Setor">Ativo no Setor</option>
                                <option value="Em Manutenção">Em Manutenção</option>
                                <option value="Devolvido">Devolvido</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="setor" class="form-label">Setor de Destino</label>
                        <!-- Iteração ajustada para ${setores} para bater com o Controller -->
                         <select class="form-select" id="setor" th:field="*{setor}">
                            <option value="">-- Informática Reserva (Estoque) --</option>
                            <option th:each="s : ${setores}"
                                    th:value="${s.id}"
                                    th:text="${s.nome} + ' (' + ${s.bloco} + ')'">
                            </option>
                         </select>
                    </div>

                    <div class="d-flex justify-content-end mt-4">
                        <a href="/computadores" class="btn btn-secondary me-2">Cancelar</a>
                        <button type="submit" class="btn btn-success">Salvar Equipamento</button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</body>
</html>
