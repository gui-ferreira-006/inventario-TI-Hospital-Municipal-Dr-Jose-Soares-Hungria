<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário de Monitores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div th:replace="~{fragments/menu :: navbar}"></div>

    <div class="container">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Inventário de Monitores</h1>
            <a href="/monitores/novo" class="btn btn-primary">+ Novo Monitor</a>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                Monitores Cadastrados
            </div>
            <div class="card-body">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Marca / Modelo</th>
                            <th>Serial</th>
                            <th>Computador Alocado</th>
                            <th>Setor Alocado</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="mon : ${monitores}">
                            <td th:text="${mon.id}">1</td>
                            <td th:text="${mon.marca} + ' / ' + ${mon.modelo}">Dell / U2419H</td>
                            <td th:text="${mon.serialMonitor}">CN-0XX123</td>
                            <td th:text="${mon.computador != null ? (mon.computador.hostname != null ? mon.computador.hostname : 'Sem Hostname') + ' (' + mon.computador.serialComputador + ')' : 'Sem Computador (Reserva)'}">SMSHMJSH001 (BRC210ABC)</td>
                            <td th:text="${mon.computador != null && mon.computador.setor != null ? mon.computador.setor.nome : 'Sem Setor (Reserva)'}">TI</td>
                            <td>
                                <a th:href="@{/monitores/editar/{id}(id=${mon.id})}" class="btn btn-warning btn-sm me-2">
                                    Editar
                                </a>
                                <a th:href="@{/monitores/excluir/{id}(id=${mon.id})}" class="btn btn-danger btn-sm"
                                    onclick="return confirm('Tem certeza que deseja remover este monitor do inventário?');">
                                    Excluir
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(monitores)}">
                            <td colspan="6" class="text-center text-muted">Nenhum monitor cadastrado ainda.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
