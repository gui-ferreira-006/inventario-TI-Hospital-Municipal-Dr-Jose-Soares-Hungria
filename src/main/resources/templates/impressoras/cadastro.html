<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Impressoras</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <div th:replace="~{fragments/menu :: navbar}"></div>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white py-3">
                        <h4 class="card-title mb-0">
                            <i class="bi bi-printer me-2"></i>
                            <span th:text="${impressora.id == null ? 'Nova Impressora' : 'Editar Impressora'}"> Cadastro de Impressoras</span>
                        </h4>
                    </div>
                    <div class="card-body p-4">

                        <form th:action="@{/impressoras/salvar}" th:object="${impressora}" method="post">

                            <input type="hidden" th:field="*{id}"/>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="marcaModelo" class="form-label fw-bold">Marca/Modelo</label>
                                    <input type="text" class="form-control" id="marcaModelo" th:field="*{marcaModelo}"
                                        th:classappend="${#fields.hasErrors('marcaModelo')} ? 'is-invalid' : ''"
                                        placeholder="Ex: HP LaserJet">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('marcaModelo')}" th:errors="*{marcaModelo}"></div>
                                </div>

                                <div class="col-md-6">
                                    <label for="serialImpressora" class="form-label fw-bold">Número de Série</label>
                                    <input type="text" class="form-control" id="serialImpressora" th:field="*{serialImpressora}"
                                        th:classappend="${#fields.hasErrors('serialImpressora')} ? 'is-invalid' : ''"
                                        placeholder="Digite o serial da impressora">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('serialImpressora')}" th:errors="*{serialImpressora}"></div>
                                </div>
                            </div>

                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <label for="enderecoIp" class="form-label fw-bold">Endereço IP</label>
                                    <input type="text" class="form-control" id="enderecoIp" th:field="*{enderecoIp}"
                                        th:classappend="${#fields.hasErrors('enderecoIp')} ? 'is-invalid' : ''"
                                        placeholder="Ex: 192.168.160.1">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('enderecoIp')}" th:errors="*{enderecoIp}"></div>
                                </div>

                                <div class="col-md-6">
                                    <label for="setor" class="form-label fw-bold">Setor</label>
                                    <select class="form-select" id="setor" th:field="*{setor}">
                                        <option value="">-- Selecione o Setor --</option>
                                        <option th:each="s : ${setores}"
                                            th:value="${s.id}"
                                            th:text="${s.nome}"></option>
                                    </select>
                                </div>
                            </div>

                            <hr class="mb-4">

                            <div class="d-flex justify-content-end">
                                <a href="/impressoras" class="btn btn-secondary me-2">Cancelar</a>
                                <button type="submit" class="btn btn-success">
                                    <i class="bi bi-save me-1"></i> Salvar Impressora
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
</body>
</html>
