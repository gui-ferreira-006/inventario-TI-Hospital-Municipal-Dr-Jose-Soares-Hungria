<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Impressora</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div th:replace="~{fragments/menu :: navbar}"></div>

    <div class="container">
        <div class="card shadow-sm mt-4">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Cadastro de Impressora</h4>
            </div>
            <div class="card-body">

                <form th:action="@{/impressoras/salvar}" th:object="${impressora}" method="post">

                    <input type="hidden" th:field="*{id}">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="marcaModelo" class="form-label">Marca/Modelo</label>
                            <input type="text" id="marcaModelo" class="form-control" th:field="*{marcaModelo}"
                                    placeholder="Ex: HP LaserJet"
                                    th:classappend="${#fields.hasErrors('marcaModelo')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('marcaModelo')}" th:errors="*{marcaModelo}"></div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="serialImpressora" class="form-label">Número de Série</label>
                            <input type="text" id="serialImpressora" class="form-control" th:field="*{serialImpressora}"
                                    placeholder="Digite o serial da impressora"
                                    th:classappend="${#fields.hasErrors('serialImpressora')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('serialImpressora')}" th:errors="*{serialImpressora}"></div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="enderecoIp" class="form-label">Endereço IP</label>
                            <select class="form-select" id="enderecoIp" th:field="*{redeIp}" th:classappend="${#fields.hasErrors('redeIp')} ? 'is-invalid'">
                                <option value="">-- Sem IP Alocado --</option>
                                <option th:each="ip : ${ipsLivres}" th:value="${ip.id}" th:text="${ip.enderecoIp}"></option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('redeIp')}" th:errors="*{redeIp}"></div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="status" class="form-label">Status da Impressora</label>
                            <select class="form-select" id="status" th:field="*{status}">
                                <option value="Ativo no Setor">Ativo no Setor</option>
                                <option value="Em Estoque/Bancada">Em Estoque / Bancada</option>
                                <option value="Em Configuração">Em Configuração</option>
                                <option value="Em Manutenção">Em Manutenção</option>
                                <option value="Devolvido">Devolvido</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="setor" class="form-label">Setor</label>
                        <select class="form-select" id="setor" th:field="*{setor}">
                            <option value="">-- Informática Reserva --</option>
                            <option th:each="s : ${setores}"
                                    th:value="${s.id}"
                                    th:text="${s.nome} + ' (' + ${s.bloco} + ')'"></option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-end mt-4">
                        <a href="/impressoras" class="btn btn-secondary me-2">Cancelar</a>
                        <button type="submit" class="btn btn-success">Salvar Impressora</button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</body>
</html>
