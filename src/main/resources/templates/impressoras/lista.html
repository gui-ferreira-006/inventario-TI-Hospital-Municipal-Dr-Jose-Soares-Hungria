<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impressoras - Inventário TI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    
    <div th:replace="~{fragments/menu :: navbar}"></div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold"><i class="bi bi-printer text-primary me-2"></i>Impressoras de Rede</h2>
            <a href="/impressoras/novo" class="btn btn-primary">
                <i class="bi bi-plus-circle me-1"></i> Nova Impressora
            </a>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover table-striped mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Marca / Modelo</th>
                            <th>Endereço IP</th>
                            <th>Setor</th>
                            <th class="text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="impressora : ${impressoras}">
                            <td class="align-middle" th:text="${impressora.id}">1</td>
                            <td class="align-middle fw-bold" th:text="${impressora.marcaModelo}">HP LaserJet</td>
                            <td class="align-middle" th:text="${impressora.serialImpressora}">BR12345</td>
                            <td class="align-middle">
                                <span class="badge bg-secondary" th:text="${impressora.enderecoIp}">192.168.160.1</span>
                            </td>
                            <td class="align-middle">
                                <span th:if="${impressora.setor != null}" th:text="${impressora.setor.nome}">Administração</span>
                                <span th:if="${impressora.setor == null}" class="text-muted fst-italic">Reserva TI</span>
                            </td>
                            <td class="align-middle text-center">
                                <a th:href="@{/impressoras/editar/{id}(id=${impressora.id})}" class="btn btn-sm btn-outline-primary" title="Editar">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/impressoras/excluir/{id}(id=${impressora.id})}" class="btn btn-sm btn-outline-danger ms-1" title="Excluir" onclick="return confirm('Tem certeza que deseja excluir esta impressora?');">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(impressoras)}">
                            <td colspan="6" class="text-center py-4 text-muted">
                                Nenhuma impressora cadastrada no momento.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
