<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Setor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Menu de Navegação -->
    <div th:replace="~{fragments/menu :: navbar}"></div>

    <div class="container">
        <div class="card shadow-sm mt-4">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Cadastrar Novo Setor</h4>
            </div>
            <div class="card-body">

                <form th:action="@{/setores/salvar}" th:object="${setor}" method="post">

                    <input type="hidden" th:field="*{id}">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="nome" class="form-label">Nome do Setor</label>
                            <input type="text" id="nome" class="form-control" th:field="*{nome}"
                                    placeholder="Ex: Farmácia, UTI, Registro"
                                    th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{nome}"></div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="bloco" class="form-label">Bloco ou Prédio</label>
                            <input type="text" id="bloco" class="form-control" th:field="*{bloco}"
                                    placeholder="Ex: Bloco A, Andar 2"
                                    th:classappend="${#fields.hasErrors('bloco')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{bloco}"></div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end mt-4">
                        <a href="/setores" class="btn btn-secondary me-2">Cancelar</a>
                        <button type="submit" class="btn btn-success">Salvar Setor</button>
                    </div>
                    
                </form>
            </div>
        </div>
    </div>
</body>
</html>
