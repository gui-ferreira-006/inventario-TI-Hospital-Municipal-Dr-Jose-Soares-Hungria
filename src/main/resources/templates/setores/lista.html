<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Setores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    
    <div th:replace="~{fragments/menu :: navbar}"></div>

    <div class="container">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Gerenciamento de Setores</h1>
            <a href="/setores/novo" class="btn btn-primary">
                + Novo Setor</a>
        </div>
    
        <div class="card">
            <div class="card-header bg-primary text-white">
                Setores Cadastrados
            </div>
            <div class="card-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome do Setor</th>
                            <th>Bloco/Localização</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="setor : ${setores}">
                            <td th:text="${setor.id}">1</td>
                            <td th:text="${setor.nome}">Nome Exemplo</td>
                            <td th:text="${setor.bloco}">Bloco Exemplo</td>
                            <td>
                                <a th:href="@{/setores/editar/{id}(id=${setor.id})}"
                                class="btn btn-warning btn-sm me-2"> Editar
                                </a>
                                
                                <a th:href="@{/setores/excluir/{id}(id=${setor.id})}"
                                class="btn btn-danger btn-sm"
                                onclick="return confirm('Tem certeza que deseja excluir este setor?');">
                                    Excluir
                                </a>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(setores)}">
                            <td colspan="4" class="text-center">Nenhum setor cadastrado ainda.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
