<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário de Impressoras</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    
    <div th:replace="~{fragments/menu :: navbar}"></div>

    <div class="container">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Inventário de Impressoras</h1>
            <a href="/impressoras/novo" class="btn btn-primary">+ Nova Impressora</a>
        </div>
    
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                Impressoras Cadastradas
            </div>
            <div class="card-body">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Marca / Modelo</th>
                            <th>Serial</th>
                            <th>Endereço IP</th>
                            <th>Setor</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="impressora : ${impressoras}">
                            <td th:text="${impressora.id}">1</td>
                            <td th:text="${impressora.marcaModelo}">HP LaserJet</td>
                            <td th:text="${impressora.serialImpressora}">BR12345</td>
                            <td th:text="${impressora.enderecoIp}">192.168.160.1</td>
                            <td th:text="${impressora.setor != null ? impressora.setor.nome : 'Sem Setor alocado'}">TI</td>
                            <td>
                                <a th:href="@{/impressoras/editar/{id}(id=${impressora.id})}"
                                class="btn btn-warning btn-sm me-2"> Editar
                                </a>
                                
                                <a th:href="@{/impressoras/excluir/{id}(id=${impressora.id})}"
                                class="btn btn-danger btn-sm"
                                onclick="return confirm('Tem certeza que deseja excluir esta impressora?');">
                                    Excluir
                                </a>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(impressoras)}">
                            <td colspan="6" class="text-center text-muted">Nenhuma impressora cadastrada ainda.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
